# ───────────────────────────────────────────────────────────
# Netlify configuration for the ElectroHub / Mobile Expert
# single-page React app.
# ───────────────────────────────────────────────────────────

# Build settings
[build]
  # The dist/ directory is created by `npm run build` (Vite + singlefile).
  publish = "dist"
  command = "npm run build"

# Environment variables (Firebase config is read from these
# instead of being hard-coded at build time).
# Set these in the Netlify site dashboard under
#   Site settings → Build & deploy → Environment → Environment variables
#
# [build.environment]
#   VITE_FIREBASE_API_KEY          = "..."
#   VITE_FIREBASE_AUTH_DOMAIN      = "..."
#   VITE_FIREBASE_DATABASE_URL     = "..."
#   VITE_FIREBASE_PROJECT_ID       = "..."
#   VITE_FIREBASE_STORAGE_BUCKET   = "..."
#   VITE_FIREBASE_MESSAGING_SENDER_ID = "..."
#   VITE_FIREBASE_APP_ID           = "..."
#   VITE_FIREBASE_MEASUREMENT_ID   = "..."

# ───────────────────────────────────────────────────────────
# Single-Page App routing.
# Because the project is a Vite SPA with client-side routing
# (managed by the App.tsx page state), every unknown URL must
# fall back to index.html so React can handle the route.
# ───────────────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# ───────────────────────────────────────────────────────────
# Security headers.
# These protect the app from common web attacks and improve
# the security score reported by Netlify.
# ───────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent the browser from MIME-sniffing a response away
    # from the declared Content-Type.
    X-Content-Type-Options      = "nosniff"

    # Block known-bad origins from embedding this site in an iframe.
    X-Frame-Options              = "DENY"

    # Enable the built-in XSS filter in old browsers.
    X-XSS-Protection             = "1; mode=block"

    # Referer policy — only send the origin for same-site requests.
    Referrer-Policy              = "strict-origin-when-cross-origin"

    # Restrict what the browser is allowed to load.
    # Firebase Realtime DB + Storage + Google auth need these.
    Content-Security-Policy      = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.firebaseio.com https://*.googleapis.com https://*.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; media-src 'self' blob:; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com wss://*.firebaseio.com https://firestore.googleapis.com https://*.firebasestorage.app; frame-src https://*.firebaseapp.com;"

    # Strict transport security — always use HTTPS.
    Strict-Transport-Security    = "max-age=31536000; includeSubDomains; preload"

    # Permissions policy — disable features we don't need.
    Permissions-Policy           = "geolocation=(), microphone=(), camera=()"

# ───────────────────────────────────────────────────────────
# Cache static assets aggressively so repeat visits are fast.
# The HTML file is intentionally NOT cached because Vite
# generates a new file on every build.
# ───────────────────────────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/logo*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ───────────────────────────────────────────────────────────
# Custom domain (optional).
# Uncomment and update with your domain when you're ready.
# ───────────────────────────────────────────────────────────
# [[redirects]]
#   from = "http://mobileexpert.lk/*"
#   to   = "https://www.mobileexpert.lk/:splat"
#   status = 301
#   force = true

# ───────────────────────────────────────────────────────────
# Build performance
# ───────────────────────────────────────────────────────────
[build.environment]
  NODE_VERSION = "20"
  # Speed up npm install on Netlify
  NPM_FLAGS = "--prefer-offline --no-audit --no-fund"
